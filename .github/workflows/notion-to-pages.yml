name: Deploy Notion to GitHub Pages

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Create site directory
        run: mkdir -p site

      - name: Install dependencies
        run: npm install playwright

      - name: Install Playwright browsers
        run: npx playwright install chromium

      - name: Fetch and convert Notion content
        run: |
          cat > fetch-notion.js << 'SCRIPT'
          const { chromium } = require('playwright');
          const fs = require('fs');
          const path = require('path');

          const NOTION_URL = 'https://dmitrijscelinskis.notion.site/portfolio';
          const OUTPUT_DIR = './site';

          async function fetchNotionPage() {
            let browser;
            try {
              console.log('Launching Playwright browser...');
              browser = await chromium.launch({ headless: true });
              
              const page = await browser.newPage();
              
              console.log(`Navigating to: ${NOTION_URL}`);
              const response = await page.goto(NOTION_URL, { waitUntil: 'networkidle', timeout: 60000 });
              console.log(`Response status: ${response.status()}`);
              
              // Wait for content to appear
              await page.waitForTimeout(3000);
              
              console.log('Extracting content...');
              const content = await page.evaluate(() => {
                // Get the full page HTML
                const html = document.documentElement.outerHTML;
                return html;
              });
              
              console.log(`Content length: ${content.length} characters`);
              
              // Save raw HTML for debugging
              fs.writeFileSync(path.join(OUTPUT_DIR, 'debug.html'), content);
              console.log('Saved debug.html');
              
              await browser.close();
              return content;
            } catch (error) {
              if (browser) await browser.close();
              console.error('Failed to fetch Notion page:', error.message);
              throw error;
            }
          }

          function extractPortfolioContent(html) {
            // Look for content sections
            const contentMatch = html.match(/<div[^>]*class="[^"]*notion[^"]*"[^>]*>.*?<\/div>/is);
            if (contentMatch) {
              return contentMatch[0];
            }
            
            // Fallback: extract all text from body
            const bodyMatch = html.match(/<body[^>]*>([\s\S]*?)<\/body>/i);
            if (bodyMatch) {
              let body = bodyMatch[1];
              body = body.replace(/<script\b[^<]*(?:(?!<\/script>)<[^<]*)*<\/script>/gi, '');
              body = body.replace(/<style\b[^<]*(?:(?!<\/style>)<[^<]*)*<\/style>/gi, '');
              return body;
            }
            
            return '<p>Portfolio content could not be extracted</p>';
          }

          async function generateHtml(title, content) {
            const html = `<!DOCTYPE html>
          <html lang="en">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>${title} - Dmitrij Čelinski</title>
              <style>
                  * { margin: 0; padding: 0; box-sizing: border-box; }
                  body { 
                      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; 
                      line-height: 1.6; color: #37352f; background: #fff;
                      max-width: 900px; margin: 0 auto; padding: 40px 20px;
                  }
                  h1, h2, h3, h4, h5, h6 { margin: 20px 0 10px 0; }
                  h1 { font-size: 32px; }
                  h2 { font-size: 24px; }
                  p { margin: 12px 0; }
                  a { color: #0969da; text-decoration: none; }
                  a:hover { text-decoration: underline; }
                  img { max-width: 100%; height: auto; margin: 10px 0; }
                  code { background: #f0f0f0; padding: 2px 6px; border-radius: 3px; font-family: monospace; }
                  pre { background: #f0f0f0; padding: 10px; overflow-x: auto; margin: 10px 0; }
                  .nav { margin-bottom: 30px; padding-bottom: 20px; border-bottom: 1px solid #e5e5e5; }
              </style>
          </head>
          <body>
              <nav class="nav">
                  <a href="index.html">← Back to Home</a>
              </nav>
              <div class="container">
                  <h1>${title}</h1>
                  <p style="color: #999; font-size: 14px;">Last updated: ${new Date().toLocaleString()}</p>
                  ${content}
              </div>
          </body>
          </html>`;
            return html;
          }

          async function main() {
            const rawHtml = await fetchNotionPage();
            const content = extractPortfolioContent(rawHtml);
            const portfolioHtml = await generateHtml('Portfolio', content);
            
            fs.writeFileSync(path.join(OUTPUT_DIR, 'portfolio.html'), portfolioHtml);
            console.log('✓ Generated portfolio.html');
          }

          main().catch(err => {
            console.error('Error:', err);
            process.exit(1);
          });
          SCRIPT
          node fetch-notion.js

      - name: Create index page
        run: |
          cat > site/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>Portfolio - Dmitrij Čelinski</title>
              <style>
                  * { margin: 0; padding: 0; box-sizing: border-box; }
                  body { 
                      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; 
                      max-width: 900px; margin: 0 auto; padding: 40px 20px; color: #333;
                  }
                  h1 { color: #000; margin-bottom: 10px; }
                  .subtitle { color: #666; margin-bottom: 30px; font-size: 14px; }
                  a { color: #0969da; text-decoration: none; }
                  a:hover { text-decoration: underline; }
              </style>
          </head>
          <body>
              <h1>Portfolio</h1>
              <p class="subtitle">Last updated: <span id="timestamp"></span></p>
              <div style="background: #f6f8fa; padding: 15px; border-left: 4px solid #0969da; margin: 20px 0;">
                  <p>✓ Site generated and deployed</p>
                  <p><a href="portfolio.html">View Portfolio</a></p>
              </div>
              <script>
                  document.getElementById('timestamp').textContent = new Date().toLocaleString();
              </script>
          </body>
          </html>
          EOF
          echo "✓ Created index.html"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
