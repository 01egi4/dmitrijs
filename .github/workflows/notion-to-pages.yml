name: Notion to GitHub Pages

on:
  # Daily trigger at 07:00 UTC
  schedule:
    - cron: '0 7 * * *'
  # Allow manual trigger
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    
    steps:
      # Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # Set up Node.js environment
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # Install dependencies for Notion processing
      - name: Install notion-to-html
        run: npm install -g notion-to-html

      # Create output directory for generated site
      - name: Create output directory
        run: mkdir -p notion-output

      # Fetch Notion page and convert to HTML
      - name: Fetch and convert Notion page
        env:
          NOTION_PAGE_URL: 'https://dmitrijscelinskis.notion.site/portfolio'
        run: |
          # Export public Notion page with all subpages
          notion-to-html \
            --url "$NOTION_PAGE_URL" \
            --output-dir ./notion-output \
            --recursive

      # Copy and process generated HTML files
      - name: Generate static website
        run: |
          # Create site directory
          mkdir -p site
          
          # Copy HTML files from notion-output to site
          cp notion-output/*.html site/ || true
          
          # Fix internal links to use local paths
          cat > fix-links.js << 'EOF'
          const fs = require('fs');
          const path = require('path');
          
          const siteDir = './site';
          const files = fs.readdirSync(siteDir).filter(f => f.endsWith('.html'));
          
          files.forEach(file => {
              const filePath = path.join(siteDir, file);
              let content = fs.readFileSync(filePath, 'utf-8');
              
              // Convert Notion links to local links
              content = content.replace(
                  /href=["']https:\/\/dmitrijscelinskis\.notion\.site\/[^"']+["']/g,
                  (match) => {
                      // Extract the title and convert to filename
                      const url = match.match(/href=["']([^"']+)["']/)[1];
                      const title = decodeURIComponent(url.split('/').pop().split('?')[0]);
                      return `href="./${title}.html"`;
                  }
              );
              
              fs.writeFileSync(filePath, content);
              console.log(`✓ Fixed links in ${file}`);
          });
          EOF
          
          npm install
          node fix-links.js

      # Create a basic index page if it doesn't exist
      - name: Ensure index.html exists
        run: |
          if [ ! -f site/index.html ]; then
            cat > site/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>Portfolio - Dmitrij Čelinski</title>
              <style>
                  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; max-width: 900px; margin: 0 auto; padding: 40px 20px; color: #333; }
                  h1 { color: #000; margin-bottom: 10px; }
                  .subtitle { color: #666; margin-bottom: 30px; }
                  .pages { list-style: none; padding: 0; }
                  .pages li { margin: 15px 0; }
                  .pages a { color: #0969da; font-size: 18px; text-decoration: none; }
                  .pages a:hover { text-decoration: underline; }
                  .updated { color: #999; font-size: 14px; margin-top: 30px; }
              </style>
          </head>
          <body>
              <h1>Portfolio</h1>
              <p class="subtitle">Last updated: <span id="lastUpdated"></span></p>
              <ul class="pages" id="pagesList"></ul>
              <p class="updated">Generated from Notion on <span id="timestamp"></span></p>
              <script>
                  document.getElementById('timestamp').textContent = new Date().toLocaleString();
              </script>
          </body>
          </html>
          EOF
          fi

      # Configure Git for pages deployment
      - name: Configure Git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

      # Commit and push changes to docs or deploy branch
      - name: Commit generated site
        run: |
          # Add generated site to git tracking (or update)
          git add site/
          git add notion-output/ || true
          
          # Commit if there are changes
          git diff --cached --quiet || git commit -m "chore: Update Notion-generated site $(date -u +'%Y-%m-%d %H:%M:%S UTC')"

      # Deploy to GitHub Pages
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          # Optionally, specify which branch contains the GH Pages source:
          # publish_branch: main  # or gh-pages if you prefer a separate branch

      # Print deployment summary
      - name: Print deployment summary
        run: |
          echo "✓ Notion page fetched and converted"
          echo "✓ Static website generated with local links"
          echo "✓ Deployed to GitHub Pages"
          echo ""
          echo "Repository: ${{ github.repository }}"
          echo "Build timestamp: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
