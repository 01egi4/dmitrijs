name: Deploy Notion to GitHub Pages

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create site directory
        run: mkdir -p site

      - name: Generate portfolio page
        run: |
          cat > site/portfolio.html << 'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>Portfolio - Dmitrij Čelinski</title>
              <style>
                  * { margin: 0; padding: 0; box-sizing: border-box; }
                  body { 
                      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; 
                      line-height: 1.6; color: #37352f; background: #fff;
                  }
                  .container { max-width: 900px; margin: 0 auto; padding: 40px 20px; }
                  h1 { font-size: 32px; margin: 20px 0 10px 0; }
                  p { margin: 12px 0; }
                  a { color: #0969da; text-decoration: none; }
                  a:hover { text-decoration: underline; }
                  .note { background: #f6f8fa; padding: 15px; border-left: 4px solid #0969da; margin: 20px 0; }
                  .nav { margin-bottom: 30px; padding-bottom: 20px; border-bottom: 1px solid #e5e5e5; }
              </style>
          </head>
          <body>
              <nav class="nav">
                  <a href="index.html">← Back</a>
              </nav>
              <div class="container">
                  <h1>Portfolio</h1>
                  <div class="note">
                      <p><strong>Coming soon...</strong> Your Notion portfolio will appear here.</p>
                      <p><a href="https://dmitrijscelinskis.notion.site/portfolio" target="_blank">View on Notion →</a></p>
                  </div>
              </div>
          </body>
          </html>
          EOF
          echo "✓ Created portfolio.html"

      - name: Create index page
        run: |
          cat > site/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>Portfolio - Dmitrij Čelinski</title>
              <style>
                  * { margin: 0; padding: 0; box-sizing: border-box; }
                  body { 
                      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; 
                      max-width: 900px; margin: 0 auto; padding: 40px 20px; color: #333;
                  }
                  h1 { color: #000; margin-bottom: 10px; }
                  .subtitle { color: #666; margin-bottom: 30px; font-size: 14px; }
                  .note { background: #f6f8fa; padding: 15px; border-left: 4px solid #0969da; margin: 20px 0; }
                  a { color: #0969da; text-decoration: none; }
                  a:hover { text-decoration: underline; }
              </style>
          </head>
          <body>
              <h1>Portfolio</h1>
              <p class="subtitle">Last updated: <span id="timestamp"></span></p>
              <div class="note">
                  <p><strong>ℹ️ Status:</strong> Site deployed successfully to GitHub Pages ✓</p>
                  <p><a href="https://dmitrijscelinskis.notion.site/portfolio" target="_blank">View original Notion page →</a></p>
              </div>
              <script>
                  document.getElementById('timestamp').textContent = new Date().toLocaleString();
              </script>
          </body>
          </html>
          EOF
          echo "✓ Created index.html"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
