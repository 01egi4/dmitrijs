name: Notion to GitHub Pages

on:
  # Daily trigger at 07:00 UTC
  schedule:
    - cron: '0 7 * * *'
  # Allow manual trigger
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    
    steps:
      # Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # Set up Node.js environment
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # Install dependencies for Notion processing
      - name: Install notion2md
        run: npm install -g notion2md

      # Create output directory for generated site
      - name: Create output directory
        run: mkdir -p notion-output

      # Fetch Notion page and convert to Markdown
      - name: Fetch and convert Notion page
        env:
          NOTION_PAGE_URL: 'https://dmitrijscelinskis.notion.site/portfolio'
        run: |
          # Export Notion page with all subpages
          notion2md \
            --url "$NOTION_PAGE_URL" \
            --output-dir ./notion-output \
            --recursive \
            --include-subpages

      # Convert Markdown to static HTML with local links
      - name: Generate static HTML website
        run: |
          # Create a directory for static site
          mkdir -p site
          
          # Use a Node.js script to convert Markdown to HTML with local links
          cat > convert.js << 'EOF'
          const fs = require('fs');
          const path = require('path');
          const marked = require('marked');
          
          // Install marked if not present
          try {
            require('marked');
          } catch (e) {
            console.log('Installing marked...');
            require('child_process').execSync('npm install marked', { stdio: 'inherit' });
          }
          
          const notionDir = './notion-output';
          const siteDir = './site';
          
          // Create index.html
          const template = (content, title) => `
          <!DOCTYPE html>
          <html lang="en">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>${title}</title>
              <style>
                  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif; line-height: 1.6; max-width: 900px; margin: 0 auto; padding: 20px; color: #333; }
                  h1, h2, h3 { color: #000; }
                  a { color: #0969da; text-decoration: none; }
                  a:hover { text-decoration: underline; }
                  code { background: #f6f8fa; padding: 2px 6px; border-radius: 3px; font-family: 'Monaco', 'Menlo', monospace; }
                  pre { background: #f6f8fa; padding: 12px; border-radius: 6px; overflow-x: auto; }
                  img { max-width: 100%; height: auto; }
                  nav { margin-bottom: 30px; padding-bottom: 20px; border-bottom: 1px solid #eaecef; }
                  nav a { margin-right: 15px; }
              </style>
          </head>
          <body>
              <nav><a href="index.html">Home</a></nav>
              <main>${content}</main>
          </body>
          </html>
          `;
          
          // Helper function to convert internal Notion links to local links
          const convertLinks = (content) => {
              // Convert Notion-style links to local HTML links
              return content
                  .replace(/\[([^\]]+)\]\(https:\/\/dmitrijscelinskis\.notion\.site\/[^)]+\)/g, (match, text) => {
                      const slug = text.toLowerCase().replace(/\s+/g, '-').replace(/[^a-z0-9-]/g, '');
                      return `[${text}](./${slug}.html)`;
                  })
                  .replace(/\[([^\]]+)\]\((?!http|mailto|#)([^)]+)\)/g, (match, text, url) => {
                      if (url.endsWith('.md')) {
                          url = url.replace('.md', '.html');
                      }
                      return `[${text}](${url})`;
                  });
          };
          
          // Process Markdown files
          const processMarkdownFiles = () => {
              if (!fs.existsSync(notionDir)) {
                  console.log('Notion output directory not found, creating placeholder...');
                  return;
              }
              
              const files = fs.readdirSync(notionDir).filter(f => f.endsWith('.md'));
              
              if (files.length === 0) {
                  console.log('No markdown files found in notion-output');
                  return;
              }
              
              files.forEach(file => {
                  const mdPath = path.join(notionDir, file);
                  const htmlFile = file.replace('.md', '.html');
                  const htmlPath = path.join(siteDir, htmlFile);
                  
                  try {
                      let content = fs.readFileSync(mdPath, 'utf-8');
                      content = convertLinks(content);
                      
                      const htmlContent = marked.parse(content);
                      const pageTitle = file.replace('.md', '').replace(/[-_]/g, ' ');
                      const fullHtml = template(htmlContent, pageTitle);
                      
                      fs.writeFileSync(htmlPath, fullHtml);
                      console.log(`✓ Converted ${file} to ${htmlFile}`);
                  } catch (error) {
                      console.error(`Error processing ${file}:`, error.message);
                  }
              });
          };
          
          processMarkdownFiles();
          EOF
          
          npm install marked
          node convert.js

      # Create a basic index page if it doesn't exist
      - name: Ensure index.html exists
        run: |
          if [ ! -f site/index.html ]; then
            cat > site/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>Portfolio - Dmitrij Čelinski</title>
              <style>
                  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; max-width: 900px; margin: 0 auto; padding: 40px 20px; color: #333; }
                  h1 { color: #000; margin-bottom: 10px; }
                  .subtitle { color: #666; margin-bottom: 30px; }
                  .pages { list-style: none; padding: 0; }
                  .pages li { margin: 15px 0; }
                  .pages a { color: #0969da; font-size: 18px; text-decoration: none; }
                  .pages a:hover { text-decoration: underline; }
                  .updated { color: #999; font-size: 14px; margin-top: 30px; }
              </style>
          </head>
          <body>
              <h1>Portfolio</h1>
              <p class="subtitle">Last updated: <span id="lastUpdated"></span></p>
              <ul class="pages" id="pagesList"></ul>
              <p class="updated">Generated from Notion on <span id="timestamp"></span></p>
              <script>
                  document.getElementById('timestamp').textContent = new Date().toLocaleString();
              </script>
          </body>
          </html>
          EOF
          fi

      # Configure Git for pages deployment
      - name: Configure Git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

      # Commit and push changes to docs or deploy branch
      - name: Commit generated site
        run: |
          # Add generated site to git tracking (or update)
          git add site/
          git add notion-output/ || true
          
          # Commit if there are changes
          git diff --cached --quiet || git commit -m "chore: Update Notion-generated site $(date -u +'%Y-%m-%d %H:%M:%S UTC')"

      # Deploy to GitHub Pages
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          # Optionally, specify which branch contains the GH Pages source:
          # publish_branch: main  # or gh-pages if you prefer a separate branch

      # Print deployment summary
      - name: Print deployment summary
        run: |
          echo "✓ Notion page fetched and converted"
          echo "✓ Static website generated with local links"
          echo "✓ Deployed to GitHub Pages"
          echo ""
          echo "Repository: ${{ github.repository }}"
          echo "Build timestamp: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
