name: Notion to GitHub Pages

on:
  # Daily trigger at 07:00 UTC
  schedule:
    - cron: '0 7 * * *'
  # Allow manual trigger
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    
    steps:
      # Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # Set up Node.js environment
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # Create output directory
      - name: Create output directory
        run: mkdir -p notion-output site

      # Fetch and process Notion page using Puppeteer for JS rendering
      - name: Fetch and convert Notion page to HTML
        run: |
          # Install Puppeteer
          npm install puppeteer
          
          # Create a Node.js script to render the Notion page
          cat > fetch-notion.js << 'EOF'
          const puppeteer = require('puppeteer');
          const fs = require('fs');
          const path = require('path');
          
          const notionPageUrl = 'https://dmitrijscelinskis.notion.site/portfolio';
          const outputDir = './notion-output';
          
          if (!fs.existsSync(outputDir)) {
            fs.mkdirSync(outputDir, { recursive: true });
          }
          
          (async () => {
            try {
              const browser = await puppeteer.launch({
                args: ['--no-sandbox', '--disable-setuid-sandbox']
              });
              
              const page = await browser.newPage();
              await page.goto(notionPageUrl, { waitUntil: 'networkidle2', timeout: 60000 });
              
              // Wait for Notion content to render
              await page.evaluate(() => {
                return new Promise((resolve) => {
                  setTimeout(resolve, 3000);
                });
              });
              
              // Extract meaningful content
              const content = await page.evaluate(() => {
                const contentDiv = document.querySelector('[data-content-editable-root]') || 
                                   document.querySelector('[role="main"]') ||
                                   document.querySelector('main') ||
                                   document.body;
                return contentDiv ? contentDiv.innerHTML : document.body.innerHTML;
              });
              
              // Create a clean HTML file
              const title = await page.title();
              const cleanHtml = `<!DOCTYPE html>
          <html lang="en">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>${title}</title>
              <style>
                  * { margin: 0; padding: 0; box-sizing: border-box; }
                  body { 
                      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; 
                      line-height: 1.6; color: #37352f; background: #fff;
                  }
                  .container { max-width: 900px; margin: 0 auto; padding: 40px 20px; }
                  h1, h2, h3, h4, h5, h6 { margin-top: 24px; margin-bottom: 12px; font-weight: 600; }
                  h1 { font-size: 32px; }
                  h2 { font-size: 24px; }
                  h3 { font-size: 20px; }
                  p { margin-bottom: 12px; }
                  a { color: #0969da; text-decoration: none; }
                  a:hover { text-decoration: underline; }
                  code { background: #f6f8fa; padding: 2px 6px; border-radius: 3px; font-family: 'Monaco', monospace; }
                  pre { background: #f6f8fa; padding: 12px; border-radius: 6px; overflow-x: auto; margin-bottom: 12px; }
                  img { max-width: 100%; height: auto; }
                  ul, ol { margin-left: 24px; margin-bottom: 12px; }
                  li { margin-bottom: 6px; }
                  blockquote { border-left: 4px solid #d0d0d0; padding-left: 12px; margin: 12px 0; color: #626262; }
                  .nav { margin-bottom: 30px; padding-bottom: 20px; border-bottom: 1px solid #e5e5e5; }
                  .nav a { margin-right: 15px; }
              </style>
          </head>
          <body>
              <nav class="nav">
                  <a href="index.html">← Back to portfolio</a>
              </nav>
              <div class="container">
                  ${content}
              </div>
          </body>
          </html>`;
              
              fs.writeFileSync(path.join(outputDir, 'portfolio.html'), cleanHtml);
              console.log('✓ Successfully fetched and rendered Notion page');
              
              await browser.close();
            } catch (err) {
              console.error('Error:', err.message);
              process.exit(1);
            }
          })();
          EOF
          
          node fetch-notion.js

      # Copy and process generated HTML files
      - name: Generate static website
        run: |
          # Copy HTML files from notion-output to site
          if [ -d notion-output ] && [ "$(ls -A notion-output)" ]; then
            cp notion-output/*.html site/ 2>/dev/null || true
            echo "✓ Copied HTML files to site directory"
          fi
          
          # Count generated files
          file_count=$(ls site/*.html 2>/dev/null | wc -l)
          echo "Generated $file_count HTML files"

      # Create or update index page
      - name: Create index page
        run: |
          cat > site/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>Portfolio - Dmitrij Čelinski</title>
              <style>
                  body { 
                      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
                      max-width: 900px; margin: 0 auto; padding: 40px 20px; color: #333; 
                  }
                  h1 { color: #000; margin-bottom: 10px; }
                  .subtitle { color: #666; margin-bottom: 30px; font-size: 14px; }
                  .note { 
                      background: #f6f8fa; padding: 15px; border-left: 4px solid #0969da; 
                      margin: 20px 0; border-radius: 3px; 
                  }
                  a { color: #0969da; text-decoration: none; }
                  a:hover { text-decoration: underline; }
              </style>
          </head>
          <body>
              <h1>Portfolio</h1>
              <p class="subtitle">Last updated: <span id="timestamp"></span></p>
              
              <div class="note">
                  <p><strong>ℹ️ Note:</strong> This is a static copy of your Notion portfolio, updated daily at 07:00 UTC.</p>
                  <p><a href="https://dmitrijscelinskis.notion.site/portfolio" target="_blank">View the original Notion page →</a></p>
              </div>
              
              <script>
                  document.getElementById('timestamp').textContent = new Date().toLocaleString('en-US', { 
                      year: 'numeric', month: 'long', day: 'numeric', 
                      hour: '2-digit', minute: '2-digit', second: '2-digit' 
                  });
              </script>
          </body>
          </html>
          EOF
          
          echo "✓ Created index.html"

      # Configure Git for pages deployment
      - name: Configure Git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

      # Commit and push changes to docs or deploy branch
      - name: Commit generated site
        run: |
          # Add generated site to git tracking (or update)
          git add site/
          git add notion-output/ || true
          
          # Commit if there are changes
          git diff --cached --quiet || git commit -m "chore: Update Notion-generated site $(date -u +'%Y-%m-%d %H:%M:%S UTC')"

      # Deploy to GitHub Pages
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          # Optionally, specify which branch contains the GH Pages source:
          # publish_branch: main  # or gh-pages if you prefer a separate branch

      # Print deployment summary
      - name: Print deployment summary
        run: |
          echo "✓ Notion page fetched and converted"
          echo "✓ Static website generated with local links"
          echo "✓ Deployed to GitHub Pages"
          echo ""
          echo "Repository: ${{ github.repository }}"
          echo "Build timestamp: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
